<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ===================== ICONS =====================
        const Icons = {
            Upload: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,

            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Sparkles: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Wand: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h0"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Save: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            ArrowRight: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
            Palette: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r="0.5" fill="currentColor"/><circle cx="17.5" cy="10.5" r="0.5" fill="currentColor"/><circle cx="8.5" cy="7.5" r="0.5" fill="currentColor"/><circle cx="6.5" cy="12.5" r="0.5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>,
            Grid: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
            Zap: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Eye: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
            Sliders: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>,
        };

        // ===================== UI COMPONENTS =====================
        const Button = ({ children, onClick, variant = 'primary', className = '', icon: Icon, disabled = false }) => {
            const variants = {
                primary: 'bg-brand-600 hover:bg-brand-700 text-white shadow-sm shadow-brand-500/20',
                secondary: 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200',
                ghost: 'hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400',
                gold: 'bg-gold-500 hover:bg-gold-600 text-white shadow-sm',
                accent: 'bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-700 hover:to-purple-700 text-white shadow-lg shadow-brand-500/25',
            };
            return (
                <button onClick={onClick} disabled={disabled}
                    className={`inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${className}`}>
                    {Icon && <Icon />} {children}
                </button>
            );
        };

        const Badge = ({ children, color = 'brand', size = 'sm' }) => {
            const colors = {
                brand: 'bg-brand-50 text-brand-700 dark:bg-brand-900/30 dark:text-brand-300',
                gray: 'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300',
                blue: 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300',
                green: 'bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-300',
                orange: 'bg-orange-50 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300',
                purple: 'bg-purple-50 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300',
                pink: 'bg-pink-50 text-pink-700 dark:bg-pink-900/30 dark:text-pink-300',
            };
            const sizes = { sm: 'px-2 py-0.5 text-[10px]', md: 'px-2.5 py-1 text-xs' };
            return <span className={`inline-flex items-center rounded-full font-medium ${colors[color]} ${sizes[size]}`}>{children}</span>;
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidth = 'max-w-lg' }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
                    <div className={`relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full ${maxWidth} max-h-[92vh] overflow-y-auto animate-scale-in`}>
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 dark:border-gray-700">
                            <h3 className="text-lg font-bold text-gray-900 dark:text-white">{title}</h3>
                            <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 transition-colors"><Icons.X /></button>
                        </div>
                        <div className="p-5">{children}</div>
                    </div>
                </div>
            );
        };

        // ===================== IMAGE ANALYSIS UTILS =====================
        const analyzeImage = (imgElement) => {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxSize = 300;
                const scale = Math.min(1, maxSize / Math.max(imgElement.naturalWidth, imgElement.naturalHeight));
                canvas.width = imgElement.naturalWidth * scale;
                canvas.height = imgElement.naturalHeight * scale;
                ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const totalPixels = canvas.width * canvas.height;

                const colorMap = {};
                let totalR = 0, totalG = 0, totalB = 0;
                let brightPixels = 0, darkPixels = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const brightness = (r + g + b) / 3;
                    totalR += r; totalG += g; totalB += b;

                    if (brightness > 200) brightPixels++;
                    else if (brightness < 50) darkPixels++;

                    const qr = Math.round(r / 32) * 32;
                    const qg = Math.round(g / 32) * 32;
                    const qb = Math.round(b / 32) * 32;
                    const key = `${qr},${qg},${qb}`;
                    colorMap[key] = (colorMap[key] || 0) + 1;
                }

                const sortedColors = Object.entries(colorMap)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 8)
                    .map(([key, count]) => {
                        const [r, g, b] = key.split(',').map(Number);
                        return { r, g, b, pct: Math.round((count / totalPixels) * 100) };
                    });

                const avgR = Math.round(totalR / totalPixels);
                const avgG = Math.round(totalG / totalPixels);
                const avgB = Math.round(totalB / totalPixels);

                const avgBrightness = (avgR + avgG + avgB) / 3;
                const brightRatio = brightPixels / totalPixels;
                const darkRatio = darkPixels / totalPixels;

                const warmth = avgR > avgB ? 'warm' : avgR < avgB ? 'cool' : 'neutral';

                const maxChannel = Math.max(avgR, avgG, avgB);
                const minChannel = Math.min(avgR, avgG, avgB);
                const saturation = maxChannel === 0 ? 0 : (maxChannel - minChannel) / maxChannel;

                resolve({
                    dominantColors: sortedColors,
                    averageColor: { r: avgR, g: avgG, b: avgB },
                    brightness: avgBrightness,
                    brightnessLabel: avgBrightness > 180 ? 'bright' : avgBrightness < 80 ? 'dark' : 'balanced',
                    brightRatio,
                    darkRatio,
                    warmth,
                    saturation: Math.round(saturation * 100),
                    aspectRatio: (imgElement.naturalWidth / imgElement.naturalHeight).toFixed(2),
                    width: imgElement.naturalWidth,
                    height: imgElement.naturalHeight,
                });
            });
        };

        const rgbToHex = (r, g, b) => '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');

        const rgbToHsl = (r, g, b) => {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        };

        // ===================== MAIN APP =====================
        const App = () => {
            const [darkMode, setDarkMode] = useState(() => {
                try { return JSON.parse(localStorage.getItem('eglux_gallery_dark') || 'false'); } catch { return false; }
            });
            const [image, setImage] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [analyzing, setAnalyzing] = useState(false);
            const [dragActive, setDragActive] = useState(false);
            const [generatedPrompt, setGeneratedPrompt] = useState('');
            const [copied, setCopied] = useState(false);
            const [showSendModal, setShowSendModal] = useState(false);
            const [sendTarget, setSendTarget] = useState(null);
            const [apiKey, setApiKey] = useState('');
            const [aiAnalyzing, setAiAnalyzing] = useState(false);
            const [aiResult, setAiResult] = useState(null);
            const imgRef = useRef(null);
            const fileInputRef = useRef(null);

            const [annotations, setAnnotations] = useState({
                subject: '',
                style: 'Unknown',
                lighting: 'Unknown',
                angle: 'Unknown',
                background: 'Unknown',
                mood: 'Unknown',
                camera: 'Unknown',
                quality: 'Unknown',
                notes: ''
            });

            const styleOptions = ['Minimalist', 'Luxury', 'Vintage', 'Modern', 'Brutalist', 'Organic', 'Tech/Cyber', 'Soft/Pastel', 'Bold/Contrast', 'Editorial', 'Scandinavian', 'Industrial', 'Bohemian', 'Art Deco', 'Unknown'];
            const lightingOptions = ['Soft natural light', 'Hard direct light', 'Warm golden hour', 'Cool overcast', 'Studio flash', 'Dramatic side light', 'Backlit', 'Neon/Cyberpunk', 'Candle light', 'Unknown'];
            const angleOptions = ['Eye level', 'Top down', '45 degree', 'Macro close-up', 'Low angle', 'High angle', 'Dutch tilt', 'Flat lay', 'Profile', 'Unknown'];
            const backgroundOptions = ['Solid color', 'Gradient', 'Lifestyle scene', 'Bokeh/Blur', 'Textured surface', 'Urban outdoor', 'Nature/Organic', 'Abstract', 'Unknown'];
            const moodOptions = ['Calm/Peaceful', 'Energetic', 'Mysterious', 'Premium/Luxe', 'Playful', 'Professional', 'Cozy/Warm', 'Futuristic', 'Nostalgic', 'Romantic', 'Unknown'];
            const cameraOptions = ['DSLR 50mm', 'DSLR 85mm', 'Wide angle 24mm', 'Macro 100mm', 'Smartphone', 'Vintage film', 'Medium format', 'Drone', 'Unknown'];
            const qualityOptions = ['Photorealistic', 'Ultra HD', 'High detail', '3D Render', 'Analog/Film', 'Illustration', 'Watercolor', 'Standard', 'Unknown'];

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('eglux_gallery_dark', JSON.stringify(darkMode));
            }, [darkMode]);

            const handleDrag = (e) => {
                e.preventDefault(); e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') setDragActive(true);
                else if (e.type === 'dragleave') setDragActive(false);
            };

            const handleDrop = async (e) => {
                e.preventDefault(); e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) await processFile(e.dataTransfer.files[0]);
            };

            const handleFileSelect = async (e) => {
                if (e.target.files && e.target.files[0]) await processFile(e.target.files[0]);
            };

            const processFile = async (file) => {
                if (!file.type.startsWith('image/')) return alert('Hanya file gambar yang didukung');
                const reader = new FileReader();
                reader.onload = () => {
                    setImage(reader.result);
                    setAnalysis(null);
                    setGeneratedPrompt('');
                    setAiResult(null);
                };
                reader.readAsDataURL(file);
            };

            const runAnalysis = useCallback(async () => {
                if (!imgRef.current) return;
                setAnalyzing(true);
                const result = await analyzeImage(imgRef.current);
                setAnalysis(result);

                const autoAnnotations = { ...annotations };
                if (result.brightnessLabel === 'bright') autoAnnotations.lighting = 'Soft natural light';
                else if (result.brightnessLabel === 'dark') autoAnnotations.lighting = 'Dramatic side light';
                if (result.warmth === 'warm') autoAnnotations.mood = 'Cozy/Warm';
                else if (result.warmth === 'cool') autoAnnotations.mood = 'Calm/Peaceful';
                if (result.saturation < 30) autoAnnotations.style = 'Minimalist';
                else if (result.saturation > 70) autoAnnotations.style = 'Bold/Contrast';
                setAnnotations(autoAnnotations);

                setAnalyzing(false);
            }, [image]);

            useEffect(() => {
                if (image && imgRef.current && imgRef.current.complete) {
                    runAnalysis();
                }
            }, [image, runAnalysis]);

            const generatePrompt = () => {
                if (!analysis) return;
                const colors = analysis.dominantColors.slice(0, 3);
                const colorDesc = colors.map(c => {
                    const hsl = rgbToHsl(c.r, c.g, c.b);
                    return (hsl.h > 30 && hsl.h < 50) ? 'warm tones' : (hsl.h > 180 && hsl.h < 260) ? 'cool tones' : 'neutral tones';
                }).filter((v, i, a) => a.indexOf(v) === i).join(', ');

                let prompt = '';
                if (annotations.subject) prompt += `A ${annotations.subject}, `;
                else prompt += 'A premium product, ';

                if (annotations.style !== 'Unknown') prompt += `${annotations.style.toLowerCase()} style, `;
                if (annotations.lighting !== 'Unknown') prompt += `${annotations.lighting.toLowerCase()}, `;
                if (annotations.angle !== 'Unknown') prompt += `shot from ${annotations.angle.toLowerCase()}, `;
                if (annotations.background !== 'Unknown') prompt += `${annotations.background.toLowerCase()} background, `;
                if (annotations.mood !== 'Unknown') prompt += `${annotations.mood.toLowerCase()} mood, `;
                if (annotations.camera !== 'Unknown') prompt += `captured with ${annotations.camera.toLowerCase()}, `;
                if (annotations.quality !== 'Unknown') prompt += `${annotations.quality.toLowerCase()}, `;

                prompt += `color palette: ${colorDesc}, `;
                prompt += `${analysis.brightnessLabel} composition, `;
                if (analysis.warmth !== 'neutral') prompt += `${analysis.warmth} atmosphere, `;

                prompt += 'professional photography, high detail';
                if (annotations.notes) prompt += `. ${annotations.notes}`;

                setGeneratedPrompt(prompt);
            };

            const handleAiAnalyze = async () => {
                if (!apiKey.trim() || !image) return;
                setAiAnalyzing(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: 'Analyze this image in detail for a prompt engineer. Describe: 1) Main subject and composition, 2) Lighting style and direction, 3) Color palette and mood, 4) Background type, 5) Camera angle and perspective, 6) Overall aesthetic/style. Format as structured data.' },
                                    { inline_data: { mime_type: 'image/jpeg', data: image.split(',')[1] } }
                                ]
                            }]
                        })
                    });
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
                    setAiResult(text);

                    const lower = text.toLowerCase();
                    const newAnnotations = { ...annotations };
                    if (lower.includes('minimalist')) newAnnotations.style = 'Minimalist';
                    else if (lower.includes('luxury') || lower.includes('luxurious')) newAnnotations.style = 'Luxury';
                    else if (lower.includes('vintage')) newAnnotations.style = 'Vintage';
                    else if (lower.includes('modern')) newAnnotations.style = 'Modern';
                    else if (lower.includes('editorial')) newAnnotations.style = 'Editorial';

                    if (lower.includes('golden hour') || lower.includes('warm')) newAnnotations.lighting = 'Warm golden hour';
                    else if (lower.includes('soft')) newAnnotations.lighting = 'Soft natural light';
                    else if (lower.includes('dramatic')) newAnnotations.lighting = 'Dramatic side light';
                    else if (lower.includes('studio')) newAnnotations.lighting = 'Studio flash';

                    if (lower.includes('flat lay') || lower.includes('top down')) newAnnotations.angle = 'Top down';
                    else if (lower.includes('eye level')) newAnnotations.angle = 'Eye level';
                    else if (lower.includes('macro')) newAnnotations.angle = 'Macro close-up';
                    else if (lower.includes('45')) newAnnotations.angle = '45 degree';

                    if (lower.includes('bokeh')) newAnnotations.background = 'Bokeh/Blur';
                    else if (lower.includes('solid')) newAnnotations.background = 'Solid color';
                    else if (lower.includes('lifestyle')) newAnnotations.background = 'Lifestyle scene';
                    else if (lower.includes('textured')) newAnnotations.background = 'Textured surface';

                    if (lower.includes('calm')) newAnnotations.mood = 'Calm/Peaceful';
                    else if (lower.includes('premium') || lower.includes('lux')) newAnnotations.mood = 'Premium/Luxe';
                    else if (lower.includes('energetic')) newAnnotations.mood = 'Energetic';
                    else if (lower.includes('cozy') || lower.includes('warm')) newAnnotations.mood = 'Cozy/Warm';

                    setAnnotations(newAnnotations);
                } catch (e) {
                    alert('Gagal analyze: ' + e.message);
                }
                setAiAnalyzing(false);
            };

            const handleCopy = () => {
                navigator.clipboard.writeText(generatedPrompt);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const sendToBuilder = () => {
                if (!generatedPrompt) return;
                const saved = JSON.parse(localStorage.getItem('yogi_saved_prompts') || '[]');
                const newPrompt = {
                    id: Date.now().toString(),
                    name: `Reverse: ${annotations.subject || 'Untitled'}`,
                    baseId: null,
                    baseName: 'Reverse Engineered',
                    params: { subject: annotations.subject, style: annotations.style, lighting: annotations.lighting, angle: annotations.angle, background: annotations.background, mood: annotations.mood, camera: annotations.camera, quality: annotations.quality },
                    extra: annotations.notes,
                    finalPrompt: generatedPrompt,
                    createdAt: new Date().toISOString()
                };
                localStorage.setItem('yogi_saved_prompts', JSON.stringify([newPrompt, ...saved]));
                setSendTarget('builder');
                setShowSendModal(true);
            };

            const sendToGallery = async () => {
                if (!generatedPrompt || !image) return;
                try {
                    const db = await new Promise((resolve, reject) => {
                        const req = indexedDB.open('EgluxGalleryDB', 1);
                        req.onerror = () => reject(req.error);
                        req.onsuccess = () => resolve(req.result);
                        req.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains('galleryItems')) {
                                db.createObjectStore('galleryItems', { keyPath: 'id', autoIncrement: true });
                            }
                        };
                    });
                    const tx = db.transaction('galleryItems', 'readwrite');
                    const store = tx.objectStore('galleryItems');
                    const item = {
                        title: `Reverse: ${annotations.subject || 'Untitled'}`,
                        prompt: generatedPrompt,
                        model: 'reverse-engineered',
                        basePromptName: 'Reverse Prompt Engineer',
                        tags: ['reverse-engineered', annotations.style, annotations.mood].filter(Boolean),
                        notes: `Analyzed from reference image. Subject: ${annotations.subject}, Style: ${annotations.style}, Lighting: ${annotations.lighting}`,
                        imageData: image,
                        timestamp: new Date().toISOString()
                    };
                    store.add(item);
                    setSendTarget('gallery');
                    setShowSendModal(true);
                } catch(e) {
                    alert('Gagal simpan ke gallery: ' + e.message);
                }
            };

            const updateAnnotation = (key, value) => {
                setAnnotations(prev => ({ ...prev, [key]: value }));
            };

                                    {darkMode ? '☀️' : '🌙'}

                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24">
                        {!image ? (
                            <div className="max-w-2xl mx-auto animate-fade-in">
                                <div className="text-center mb-8">
                                    <div className="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-white shadow-xl shadow-brand-500/20">
                                        <Icons.Wand />
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-2">Reverse Prompt Engineer</h2>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 max-w-md mx-auto">Upload gambar referensi dari Pinterest, Behance, atau hasil AI orang lain. Sistem akan menganalisis elemen visual dan generate prompt yang bisa recreate gaya serupa.</p>
                                </div>

                                <div
                                    onDragEnter={handleDrag} onDragLeave={handleDrag} onDragOver={handleDrag} onDrop={handleDrop}
                                    onClick={() => fileInputRef.current?.click()}
                                    className={`relative border-2 border-dashed rounded-3xl p-12 text-center cursor-pointer transition-all ${dragActive ? "drag-active" : "border-gray-300 dark:border-gray-600 hover:border-brand-400 dark:hover:border-brand-500 bg-white dark:bg-gray-800"}`}>
                                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleFileSelect} />
                                    <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-brand-50 dark:bg-brand-900/20 flex items-center justify-center text-brand-500">
                                        <Icons.Upload />
                                    </div>
                                    <p className="text-base font-semibold text-gray-700 dark:text-gray-300 mb-1">Drag & drop gambar referensi</p>
                                    <p className="text-sm text-gray-400">atau klik untuk pilih file (JPG, PNG, WEBP)</p>
                                    <div className="mt-6 flex justify-center gap-3 text-xs text-gray-400">
                                        <span className="px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-700">Pinterest</span>
                                        <span className="px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-700">Behance</span>
                                        <span className="px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-700">Instagram</span>

                                            <img ref={imgRef} src={image} alt="Reference" className="w-full h-auto" onLoad={runAnalysis} />
                                            <button onClick={() => { setImage(null); setAnalysis(null); setGeneratedPrompt(''); setAiResult(null); }}
                                                className="absolute top-3 right-3 p-2 bg-black/60 text-white rounded-lg hover:bg-black/80 backdrop-blur-sm transition-colors">
                                                <Icons.X />
                                            </button>
                                        </div>

                                        {analysis && (
                                            <div className="p-5 space-y-4">
                                                <div className="flex items-center justify-between">
                                                    <h3 className="text-sm font-bold text-gray-900 dark:text-white flex items-center gap-2">
                                                        <Icons.Palette /> Analisis Visual
                                                    </h3>
                                                    <Badge color="green">{analysis.width}&times;{analysis.height}</Badge>
                                                </div>

                                                {/* Dominant Colors */}
                                                <div>
                                                    <p className="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-2">Dominant Colors</p>
                                                    <div className="flex gap-3 flex-wrap">
                                                        {analysis.dominantColors.map((c, i) => (
                                                            <div key={i} className="flex flex-col items-center gap-1">
                                                                <div className="w-10 h-10 rounded-full color-swatch" style={{backgroundColor: rgbToHex(c.r, c.g, c.b)}} />
                                                                <span className="text-[10px] text-gray-400">{c.pct}%</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                {/* Stats Grid */}
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div className="p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl">
                                                        <p className="text-[10px] text-gray-400 uppercase">Brightness</p>
                                                        <p className="text-sm font-semibold text-gray-900 dark:text-white">{analysis.brightnessLabel}</p>
                                                        <div className="mt-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                                            <div className="h-full bg-brand-500 rounded-full" style={{width: `${analysis.brightness / 2.55}%`}}/>
                                                        </div>
                                                    </div>
                                                    <div className="p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl">
                                                        <p className="text-[10px] text-gray-400 uppercase">Warmth</p>
                                                        <p className="text-sm font-semibold text-gray-900 dark:text-white capitalize">{analysis.warmth}</p>
                                                        <p className="text-[10px] text-gray-400 mt-1">Saturation {analysis.saturation}%</p>
                                                    </div>
                                                    <div className="p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl">
                                                        <p className="text-[10px] text-gray-400 uppercase">Aspect Ratio</p>
                                                        <p className="text-sm font-semibold text-gray-900 dark:text-white">{analysis.aspectRatio}</p>
                                                        <p className="text-[10px] text-gray-400 mt-1">{analysis.width}&times;{analysis.height}</p>
                                                    </div>
                                                    <div className="p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl">
                                                        <p className="text-[10px] text-gray-400 uppercase">Contrast</p>
                                                        <p className="text-sm font-semibold text-gray-900 dark:text-white">{(analysis.brightRatio * 100).toFixed(0)}% bright / {(analysis.darkRatio * 100).toFixed(0)}% dark</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {analyzing && (
                                            <div className="p-8 text-center">
                                                <div className="w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full animate-spin mx-auto mb-3" />
                                                <p className="text-sm text-gray-500">Menganalisis warna dan komposisi...</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* AI Analysis with Gemini */}
                                    <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 shadow-sm">
                                        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-3 flex items-center gap-2">
                                            <Icons.Zap /> AI Deep Analysis (Gemini Vision)
                                        </h3>
                                        <div className="space-y-3">
                                            <input
                                                type="password"
                                                value={apiKey}
                                                onChange={e => setApiKey(e.target.value)}
                                                placeholder="Paste Gemini API Key (opsional)"
                                                className="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
                                            />
                                            <p className="text-[10px] text-gray-400">API key hanya disimpan di memory (tidak tersimpan). Digunakan untuk analisis mendalam dengan Gemini Vision.</p>
                                            <Button onClick={handleAiAnalyze} variant="accent" icon={Icons.Wand} disabled={!apiKey.trim() || aiAnalyzing || !image} className="w-full justify-center">
                                                {aiAnalyzing ? 'Menganalisis dengan AI...' : 'Analyze dengan Gemini Vision'}
                                            </Button>
                                        </div>
                                        {aiResult && (
                                            <div className="mt-4 p-4 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-200 dark:border-gray-700">
                                                <p className="text-xs text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">{aiResult}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Right: Annotations + Prompt */}
                                <div className="lg:col-span-7 space-y-6">
                                    {/* Manual Annotation */}
                                    <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 shadow-sm">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-sm font-bold text-gray-900 dark:text-white flex items-center gap-2">
                                                <Icons.Sliders /> Anotasi Manual
                                            </h3>
                                            <span className="text-[10px] text-gray-400">Isi untuk hasil prompt lebih akurat</span>
                                        </div>

                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Subject / Produk</label>
                                                <input type="text" value={annotations.subject} onChange={e => updateAnnotation('subject', e.target.value)}
                                                    placeholder="Contoh: matte black perfume bottle, wireless earbuds..."
                                                    className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Style</label>
                                                    <select value={annotations.style} onChange={e => updateAnnotation('style', e.target.value)}
                                                        className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                        {styleOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Lighting</label>
                                                    <select value={annotations.lighting} onChange={e => updateAnnotation('lighting', e.target.value)}
                                                        className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                        {lightingOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Camera Angle</label>
                                                    <select value={annotations.angle} onChange={e => updateAnnotation('angle', e.target.value)}
                                                        className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                        {angleOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Background</label>
                                                    <select value={annotations.background} onChange={e => updateAnnotation('background', e.target.value)}
                                                        className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                        {backgroundOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Mood</label>
                                                    <select value={annotations.mood} onChange={e => updateAnnotation('mood', e.target.value)}
                                                        className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                        {moodOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Camera</label>
                                                    <select value={annotations.camera} onChange={e => updateAnnotation('camera', e.target.value)}
                                                        className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                        {cameraOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Quality / Render Style</label>
                                                <select value={annotations.quality} onChange={e => updateAnnotation('quality', e.target.value)}
                                                    className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                                    {qualityOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Catatan Tambahan</label>
                                                <textarea value={annotations.notes} onChange={e => updateAnnotation('notes', e.target.value)}
                                                    placeholder="Detail spesifik yang lu notice: texture, material, reflection, composition rules..."
                                                    rows={2}
                                                    className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none" />
                                            </div>
                                        </div>

                                        <div className="mt-5">
                                            <Button onClick={generatePrompt} variant="primary" icon={Icons.Wand} disabled={!analysis} className="w-full justify-center">
                                                Generate Prompt dari Analisis
                                            </Button>
                                        </div>
                                    </div>

                                    {/* Generated Prompt */}
                                    {generatedPrompt && (
                                        <div className="bg-gradient-to-br from-brand-50 to-purple-50 dark:from-gray-800 dark:to-gray-800 rounded-2xl border border-brand-100 dark:border-gray-700 p-5 animate-fade-in">
                                            <div className="flex items-center justify-between mb-3">
                                                <h3 className="text-sm font-bold text-brand-800 dark:text-brand-300 flex items-center gap-2">
                                                    <Icons.Sparkles /> Generated Prompt
                                                </h3>
                                                <div className="flex gap-2">
                                                    <button onClick={handleCopy} className="p-1.5 rounded-lg bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-500 hover:text-brand-600 transition-colors">
                                                        {copied ? <Icons.Check /> : <Icons.Copy />}
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="p-4 bg-white dark:bg-gray-900 rounded-xl border border-brand-100 dark:border-gray-700">
                                                <p className="text-sm text-gray-800 dark:text-gray-200 font-mono leading-relaxed whitespace-pre-wrap">{generatedPrompt}</p>
                                            </div>
                                            <div className="flex items-center gap-3 mt-4 text-xs text-gray-500">
                                                <span className="px-2 py-1 bg-white dark:bg-gray-900 rounded-md border border-gray-200 dark:border-gray-700">{generatedPrompt.length} chars</span>
                                                <span className="px-2 py-1 bg-white dark:bg-gray-900 rounded-md border border-gray-200 dark:border-gray-700">{generatedPrompt.split(/\s+/).length} words</span>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 mt-5">
                                                <Button onClick={sendToBuilder} variant="secondary" icon={Icons.Sparkles}>
                                                    Simpan ke PromptBuilder
                                                </Button>
                                                <Button onClick={sendToGallery} variant="secondary" icon={Icons.Grid}>
                                                    Simpan ke Gallery
                                                </Button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
                        <p className="text-xs text-gray-400 dark:text-gray-600">Eglux Reverse Prompt Engineer &bull; Analisis visual lokal + Gemini Vision API opsional</p>
                    </footer>

                    {/* Send Success Modal */}
                    <Modal isOpen={showSendModal} onClose={() => setShowSendModal(false)} title="Berhasil!">
                        <div className="text-center space-y-4">
                            <div className="w-14 h-14 mx-auto rounded-full bg-green-50 dark:bg-green-900/20 flex items-center justify-center text-green-500">
                                <Icons.Check />
                            </div>
                            <h4 className="text-base font-bold text-gray-900 dark:text-white">
                                {sendTarget === 'builder' ? 'Prompt tersimpan di PromptBuilder!' : 'Gambar + Prompt tersimpan di Gallery!'}
                            </h4>
                            <p className="text-sm text-gray-500 dark:text-gray-400">
                                {sendTarget === 'builder' 
                                    ? 'Buka tab "My Prompts" di PromptBuilder untuk melihat prompt hasil reverse engineering.' 
                                    : 'Buka Gallery untuk melihat gambar referensi dengan prompt yang sudah terpasang.'}
                            </p>
                            <div className="flex justify-center gap-3 pt-2">
                                <Button onClick={() => setShowSendModal(false)} variant="secondary">Tutup</Button>
                                <Button onClick={() => window.location.href = sendTarget === 'builder' ? 'index.html' : 'gallery.html'} variant="primary" icon={Icons.ArrowRight}>
                                    Buka {sendTarget === 'builder' ? 'PromptBuilder' : 'Gallery'}
                                </Button>
                            </div>
                        </div>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
