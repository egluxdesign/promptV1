        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.7);
        }
        .gradient-text {
            background: linear-gradient(135deg, #7c3aed 0%, #c026d3 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #cba65a 0%, #cba65a 50%, #cba65a 100%);
        }
        .gradient-border {
            position: relative;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(135deg, #8b5cf6, #c026d3, #f59e0b);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>

                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.log(error);
                }
            };
            return [storedValue, setValue];
        };

        const generateFinalPrompt = (basePrompt, params, extra) => {
            let prompt = basePrompt || '';

            // Replace {subject} placeholder
            if (params.subject) {
                prompt = prompt.replace(/\{subject\}/g, params.subject);
            } else {
                prompt = prompt.replace(/\{subject\}/g, 'product');
            }

            const additions = [];
            if (params.style && params.style !== 'Standard') additions.push(`${params.style.toLowerCase()} style`);
            if (params.lighting) additions.push(`${params.lighting.toLowerCase()}`);
            if (params.angle) additions.push(`shot from ${params.angle.toLowerCase()}`);
            if (params.background) additions.push(`${params.background.toLowerCase()} background`);
            if (params.mood) additions.push(`${params.mood.toLowerCase()} mood`);
            if (params.camera) additions.push(`captured with ${params.camera.toLowerCase()}`);
            if (params.colorGrade) additions.push(`color graded with ${params.colorGrade.toLowerCase()}`);
            if (params.subjectModifier) additions.push(`${params.subjectModifier.toLowerCase()}`);
            if (params.quality && params.quality !== 'Standard') additions.push(`${params.quality.toLowerCase()}`);
            if (params.aspectRatio) additions.push(`aspect ratio ${params.aspectRatio.split(' ')[0]}`);

            if (additions.length > 0) {
                prompt += '. Additional details: ' + additions.join(', ') + '.';
            }

            if (extra && extra.trim()) {
                prompt += ' ' + extra.trim();
            }

            return prompt;
        };

        const parseCSV = (csvText) => {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                if (values.length < 2) continue;

                const obj = {};
                headers.forEach((h, idx) => {
                    obj[h.toLowerCase().replace(/\s+/g, '')] = values[idx] || '';
                });

                result.push({
                    id: `imported-${Date.now()}-${i}`,
                    name: obj.name || obj.nama || obj.title || `Imported ${i}`,
                    category: obj.category || obj.kategori || 'Uncategorized',
                    basePrompt: obj.baseprompt || obj.prompt || obj.base || obj.template || '',
                    description: obj.description || obj.desc || obj.deskripsi || '',
                    tags: (obj.tags || obj.tag || '').split(/[,;]/).map(t => t.trim()).filter(Boolean),
                    isDefault: false
                });

                        const jsonData = JSON.parse(importText);
                        if (Array.isArray(jsonData)) {

                                description: item.description || item.desc || item.Deskripsi || '',
                                tags: (item.tags || item.tag || item.Tags || '').toString().split(/[,;]/).map(t => t.trim()).filter(Boolean),
