<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eglux Gallery — Image & Prompt Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd',
                            400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9',
                            800: '#5b21b6', 900: '#4c1d95',
                        },
                        gold: { 400: '#cba65a', 500: '#b8944f', 600: '#a68345' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .masonry-grid { column-count: 1; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }
        .masonry-item { break-inside: avoid; margin-bottom: 1.25rem; }
        .prompt-line-clamp { display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .glass-panel { background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); }
        .dark .glass-panel { background: rgba(17,24,39,0.75); }
        @keyframes fadeIn { from { opacity:0; transform: translateY(12px);} to { opacity:1; transform: translateY(0);} }
        .animate-fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes scaleIn { from { opacity:0; transform: scale(0.95);} to { opacity:1; transform: scale(1);} }
        .animate-scale-in { animation: scaleIn 0.25s ease-out; }
        .drag-active { border-color: #8b5cf6 !important; background: rgba(139,92,246,0.08) !important; }
        .image-hover-overlay { opacity: 0; transition: opacity 0.2s ease; }
        .group:hover .image-hover-overlay { opacity: 1; }
    </style>
<base target="_blank">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // ===================== ICONS =====================
        const Icons = {
            Upload: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Image: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
            Copy: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
            Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Filter: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            Tag: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>,
            Calendar: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Sparkles: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
            Maximize: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>,
            Grid: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
            List: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Import: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v12"/><path d="M17 8l-5-5-5 5"/><path d="M21 14v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>,
            External: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
        };

        // ===================== INDEXEDDB =====================
        const DB_NAME = 'EgluxGalleryDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'galleryItems';

        const openDB = () => {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => resolve(req.result);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                        store.createIndex('model', 'model', { unique: false });
                        store.createIndex('tags', 'tags', { unique: false, multiEntry: true });
                    }
                };
            });
        };

        const dbAdd = async (item) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.add(item);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };

        const dbGetAll = async () => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result.reverse());
                req.onerror = () => reject(req.error);
            });
        };

        const dbDelete = async (id) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        };

        const dbUpdate = async (item) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const req = store.put(item);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        };

        // ===================== UTILS =====================
        const fileToBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        };

        const formatDate = (iso) => {
            const d = new Date(iso);
            return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        };

        const generateId = () => Math.random().toString(36).substring(2, 15) + Date.now().toString(36);

        // ===================== UI COMPONENTS =====================
        const Button = ({ children, onClick, variant = 'primary', className = '', icon: Icon, disabled = false }) => {
            const variants = {
                primary: 'bg-brand-600 hover:bg-brand-700 text-white shadow-sm shadow-brand-500/20',
                secondary: 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200',
                danger: 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 hover:bg-red-100 dark:hover:bg-red-900/30 text-red-600 dark:text-red-400',
                ghost: 'hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400',
                gold: 'bg-gold-500 hover:bg-gold-600 text-white shadow-sm',
            };
            return (
                <button onClick={onClick} disabled={disabled}
                    className={`inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${className}`}>
                    {Icon && <Icon />} {children}
                </button>
            );
        };

        const Badge = ({ children, color = 'brand', size = 'sm' }) => {
            const colors = {
                brand: 'bg-brand-50 text-brand-700 dark:bg-brand-900/30 dark:text-brand-300',
                gray: 'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300',
                blue: 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300',
                green: 'bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-300',
                orange: 'bg-orange-50 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300',
                pink: 'bg-pink-50 text-pink-700 dark:bg-pink-900/30 dark:text-pink-300',
            };
            const sizes = { sm: 'px-2 py-0.5 text-[10px]', md: 'px-2.5 py-1 text-xs' };
            return <span className={`inline-flex items-center rounded-full font-medium ${colors[color]} ${sizes[size]}`}>{children}</span>;
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidth = 'max-w-lg' }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
                    <div className={`relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full ${maxWidth} max-h-[92vh] overflow-y-auto animate-scale-in`}>
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 dark:border-gray-700">
                            <h3 className="text-lg font-bold text-gray-900 dark:text-white">{title}</h3>
                            <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 transition-colors"><Icons.X /></button>
                        </div>
                        <div className="p-5">{children}</div>
                    </div>
                </div>
            );
        };

        // ===================== UPLOAD MODAL =====================
        const UploadModal = ({ isOpen, onClose, onSave, importedPrompt }) => {
            const [dragActive, setDragActive] = useState(false);
            const [preview, setPreview] = useState(null);
            const [fileName, setFileName] = useState('');
            const [form, setForm] = useState({
                title: '',
                prompt: '',
                model: 'gemini-2.0-flash-001',
                basePromptName: '',
                tags: [],
                notes: '',
                imageData: null
            });
            const [tagInput, setTagInput] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (importedPrompt) {
                    setForm(prev => ({
                        ...prev,
                        prompt: importedPrompt.finalPrompt || importedPrompt.prompt || '',
                        basePromptName: importedPrompt.baseName || importedPrompt.name || '',
                        model: 'gemini-2.0-flash-001'
                    }));
                }
            }, [importedPrompt]);

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') setDragActive(true);
                else if (e.type === 'dragleave') setDragActive(false);
            };

            const handleDrop = async (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    await processFile(e.dataTransfer.files[0]);
                }
            };

            const handleFileSelect = async (e) => {
                if (e.target.files && e.target.files[0]) {
                    await processFile(e.target.files[0]);
                }
            };

            const processFile = async (file) => {
                if (!file.type.startsWith('image/')) return;
                const base64 = await fileToBase64(file);
                setPreview(base64);
                setFileName(file.name);
                setForm(prev => ({ ...prev, imageData: base64, title: prev.title || file.name.replace(/\.[^/.]+$/, '') }));
            };

            const addTag = () => {
                if (tagInput.trim() && !form.tags.includes(tagInput.trim())) {
                    setForm(prev => ({ ...prev, tags: [...prev.tags, tagInput.trim()] }));
                    setTagInput('');
                }
            };

            const removeTag = (tag) => setForm(prev => ({ ...prev, tags: prev.tags.filter(t => t !== tag) }));

            const handleSubmit = () => {
                if (!form.imageData || !form.prompt.trim()) return;
                onSave({ ...form, timestamp: new Date().toISOString(), id: generateId() });
                setForm({ title: '', prompt: '', model: 'gemini-2.0-flash-001', basePromptName: '', tags: [], notes: '', imageData: null });
                setPreview(null);
                setFileName('');
                onClose();
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Upload Image + Prompt" maxWidth="max-w-2xl">
                    <div className="space-y-4">
                        {/* Drag & Drop */}
                        <div
                            onDragEnter={handleDrag} onDragLeave={handleDrag} onDragOver={handleDrag} onDrop={handleDrop}
                            onClick={() => fileInputRef.current?.click()}
                            className={`relative border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer transition-all ${dragActive ? 'drag-active' : 'border-gray-300 dark:border-gray-600 hover:border-brand-400 dark:hover:border-brand-500 bg-gray-50 dark:bg-gray-900/50'}`}>
                            <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleFileSelect} />
                            {preview ? (
                                <div className="relative inline-block">
                                    <img src={preview} alt="Preview" className="max-h-48 rounded-xl shadow-lg mx-auto" />
                                    <button onClick={(e) => { e.stopPropagation(); setPreview(null); setForm(p => ({...p, imageData:null})); }}
                                        className="absolute -top-2 -right-2 p-1 bg-red-500 text-white rounded-full hover:bg-red-600 shadow-md">
                                        <Icons.X />
                                    </button>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    <div className="w-14 h-14 mx-auto rounded-full bg-brand-50 dark:bg-brand-900/20 flex items-center justify-center text-brand-500">
                                        <Icons.Upload />
                                    </div>
                                    <p className="text-sm font-medium text-gray-700 dark:text-gray-300">Drag & drop gambar di sini</p>
                                    <p className="text-xs text-gray-400">atau klik untuk pilih file (JPG, PNG, WEBP)</p>
                                </div>
                            )}
                        </div>

                        {/* Form */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Judul / Nama</label>
                                <input type="text" value={form.title} onChange={e => setForm(p => ({...p, title: e.target.value}))}
                                    placeholder="Contoh: Skincare Hero Shot Q2"
                                    className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                            </div>
                            <div>
                                <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Model AI</label>
                                <select value={form.model} onChange={e => setForm(p => ({...p, model: e.target.value}))}
                                    className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                                    <option>gemini-2.0-flash-001</option>
                                    <option>gemini-2.0-flash-002</option>
                                    <option>gemini-2.5-pro-001</option>
                                    <option>flux-1-dev</option>
                                    <option>flux-1-pro</option>
                                    <option>midjourney-v6</option>
                                    <option>stable-diffusion-xl</option>
                                    <option>dall-e-3</option>
                                    <option>lainnya</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Prompt Lengkap</label>
                            <textarea value={form.prompt} onChange={e => setForm(p => ({...p, prompt: e.target.value}))}
                                placeholder="Paste prompt lengkap yang digunakan untuk generate gambar ini..."
                                rows={4}
                                className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-mono leading-relaxed focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none" />
                        </div>

                        <div>
                            <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Base Prompt (opsional)</label>
                            <input type="text" value={form.basePromptName} onChange={e => setForm(p => ({...p, basePromptName: e.target.value}))}
                                placeholder="Contoh: Product Hero Shot"
                                className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                        </div>

                        {/* Tags */}
                        <div>
                            <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Tags</label>
                            <div className="flex gap-2 mb-2">
                                <input type="text" value={tagInput} onChange={e => setTagInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addTag())}
                                    placeholder="Tambah tag..."
                                    className="flex-1 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                <Button onClick={addTag} variant="secondary">Add</Button>
                            </div>
                            <div className="flex flex-wrap gap-1.5">
                                {form.tags.map(tag => (
                                    <span key={tag} className="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-brand-50 dark:bg-brand-900/20 text-brand-700 dark:text-brand-300 text-xs font-medium">
                                        {tag} <button onClick={() => removeTag(tag)} className="hover:text-red-500">×</button>
                                    </span>
                                ))}
                            </div>
                        </div>

                        <div>
                            <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Catatan / Notes</label>
                            <textarea value={form.notes} onChange={e => setForm(p => ({...p, notes: e.target.value}))}
                                placeholder="Catatan tambahan: revisi, feedback client, dll..."
                                rows={2}
                                className="w-full px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none" />
                        </div>

                        <div className="flex justify-end gap-2 pt-2">
                            <Button onClick={onClose} variant="secondary">Batal</Button>
                            <Button onClick={handleSubmit} variant="primary" icon={Icons.Upload} disabled={!form.imageData || !form.prompt.trim()}>Simpan ke Gallery</Button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // ===================== DETAIL MODAL =====================
        const DetailModal = ({ item, isOpen, onClose, onDelete }) => {
            const [copied, setCopied] = useState(false);
            const [imgExpanded, setImgExpanded] = useState(false);
            if (!item) return null;

            const handleCopy = () => {
                navigator.clipboard.writeText(item.prompt);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handleDownload = () => {
                const a = document.createElement('a');
                a.href = item.imageData;
                a.download = `${item.title || 'eglux-image'}.png`;
                a.click();
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={item.title || 'Untitled'} maxWidth="max-w-4xl">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Image */}
                        <div className="relative group">
                            <div className={`overflow-hidden rounded-2xl bg-gray-100 dark:bg-gray-900 ${imgExpanded ? 'fixed inset-4 z-50 flex items-center justify-center bg-black/90' : ''}`}
                                onClick={() => imgExpanded ? setImgExpanded(false) : null}>
                                <img src={item.imageData} alt={item.title}
                                    className={`w-full h-auto object-cover rounded-2xl cursor-zoom-in ${imgExpanded ? 'max-h-full max-w-full object-contain cursor-zoom-out' : ''}`}
                                    onClick={() => !imgExpanded && setImgExpanded(true)} />
                            </div>
                            {!imgExpanded && (
                                <div className="absolute top-3 right-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onClick={() => setImgExpanded(true)} className="p-2 bg-black/60 text-white rounded-lg hover:bg-black/80 backdrop-blur-sm">
                                        <Icons.Maximize />
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Info */}
                        <div className="space-y-5">
                            <div className="flex items-center gap-2 flex-wrap">
                                <Badge color="brand">{item.model}</Badge>
                                {item.basePromptName && <Badge color="gray">{item.basePromptName}</Badge>}
                                <span className="text-xs text-gray-400 flex items-center gap-1"><Icons.Calendar /> {formatDate(item.timestamp)}</span>
                            </div>

                            <div>
                                <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                                    <Icons.Sparkles /> Prompt
                                </label>
                                <div className="relative">
                                    <div className="p-4 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-200 dark:border-gray-700">
                                        <p className="text-sm text-gray-800 dark:text-gray-200 font-mono leading-relaxed whitespace-pre-wrap">{item.prompt}</p>
                                    </div>
                                    <button onClick={handleCopy}
                                        className="absolute top-3 right-3 p-1.5 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-500 hover:text-brand-600 transition-colors shadow-sm">
                                        {copied ? <Icons.Check /> : <Icons.Copy />}
                                    </button>
                                </div>
                            </div>

                            {item.notes && (
                                <div>
                                    <label className="block text-[11px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Notes</label>
                                    <p className="text-sm text-gray-600 dark:text-gray-300 bg-yellow-50 dark:bg-yellow-900/10 p-3 rounded-xl border border-yellow-100 dark:border-yellow-900/30">{item.notes}</p>
                                </div>
                            )}

                            {item.tags?.length > 0 && (
                                <div className="flex flex-wrap gap-1.5">
                                    {item.tags.map(tag => <Badge key={tag} color="blue"><Icons.Tag /> {tag}</Badge>)}
                                </div>
                            )}

                            <div className="pt-4 border-t border-gray-100 dark:border-gray-700 flex gap-2">
                                <Button onClick={handleCopy} variant="secondary" icon={copied ? Icons.Check : Icons.Copy} className={copied ? 'text-green-600 border-green-200' : ''}>
                                    {copied ? 'Copied!' : 'Copy Prompt'}
                                </Button>
                                <Button onClick={handleDownload} variant="secondary" icon={Icons.Download}>Download Image</Button>
                                <Button onClick={() => { if(confirm('Yakin hapus?')) { onDelete(item.id); onClose(); } }} variant="danger" icon={Icons.Trash} className="ml-auto">Hapus</Button>
                            </div>
                        </div>
                    </div>
                </Modal>
            );
        };

        // ===================== IMPORT FROM PROMPTBUILDER =====================
        const ImportPromptBuilderModal = ({ isOpen, onClose, onImport }) => {
            const [savedPrompts, setSavedPrompts] = useState([]);
            const [history, setHistory] = useState([]);
            const [selected, setSelected] = useState([]);

            useEffect(() => {
                if (isOpen) {
                    try {
                        const s = JSON.parse(localStorage.getItem('yogi_saved_prompts') || '[]');
                        const h = JSON.parse(localStorage.getItem('yogi_history') || '[]');
                        setSavedPrompts(s);
                        setHistory(h);
                    } catch(e) { console.error(e); }
                }
            }, [isOpen]);

            const toggleSelect = (item) => {
                setSelected(prev => {
                    const exists = prev.find(p => p.id === item.id);
                    if (exists) return prev.filter(p => p.id !== item.id);
                    return [...prev, item];
                });
            };

            const handleImport = () => {
                selected.forEach(item => onImport(item));
                setSelected([]);
                onClose();
            };

            const PromptRow = ({ item, source }) => (
                <div onClick={() => toggleSelect(item)}
                    className={`p-3 rounded-xl border cursor-pointer transition-all ${selected.find(p => p.id === item.id) ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : 'border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                    <div className="flex items-start justify-between">
                        <div className="flex-1 min-w-0">
                            <p className="text-sm font-medium text-gray-900 dark:text-white truncate">{item.name || item.baseName || 'Untitled'}</p>
                            <p className="text-xs text-gray-500 dark:text-gray-400 line-clamp-2 mt-1 font-mono">{item.finalPrompt || item.prompt || ''}</p>
                            <div className="flex items-center gap-2 mt-2">
                                <Badge size="sm" color="gray">{source}</Badge>
                                <span className="text-[10px] text-gray-400">{item.createdAt ? new Date(item.createdAt).toLocaleDateString('id-ID') : new Date(item.timestamp).toLocaleDateString('id-ID')}</span>
                            </div>
                        </div>
                        <div className={`w-5 h-5 rounded-full border-2 ml-3 flex-shrink-0 flex items-center justify-center ${selected.find(p => p.id === item.id) ? 'border-brand-500 bg-brand-500' : 'border-gray-300 dark:border-gray-600'}`}>
                            {selected.find(p => p.id === item.id) && <div className="w-2 h-2 bg-white rounded-full" />}
                        </div>
                    </div>
                </div>
            );

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Import dari PromptBuilder" maxWidth="max-w-xl">
                    <div className="space-y-4">
                        <div className="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800">
                            <p className="text-xs text-blue-800 dark:text-blue-300">Pilih prompt dari "My Prompts" atau "History" PromptBuilder. Setelah import, upload gambar yang sesuai dengan prompt tersebut.</p>
                        </div>

                        {savedPrompts.length === 0 && history.length === 0 ? (
                            <div className="text-center py-8 text-gray-400 text-sm">Gak ada data PromptBuilder di localStorage. Pastikan lu pernah save prompt di PromptBuilder.</div>
                        ) : (
                            <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-1">
                                {savedPrompts.length > 0 && (
                                    <div>
                                        <h4 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">My Prompts ({savedPrompts.length})</h4>
                                        <div className="space-y-2">{savedPrompts.map((p, i) => <PromptRow key={`saved-${i}`} item={p} source="Saved" />)}</div>
                                    </div>
                                )}
                                {history.length > 0 && (
                                    <div>
                                        <h4 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">History ({history.length})</h4>
                                        <div className="space-y-2">{history.slice(0, 20).map((p, i) => <PromptRow key={`hist-${i}`} item={p} source="History" />)}</div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="flex justify-end gap-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                            <Button onClick={onClose} variant="secondary">Batal</Button>
                            <Button onClick={handleImport} variant="primary" icon={Icons.Import} disabled={selected.length === 0}>
                                Import {selected.length} Prompt
                            </Button>
                        </div>
                    </div>
                </Modal>
            );
        };

        // ===================== MAIN APP =====================
        const App = () => {
            const [items, setItems] = useState([]);
            const [darkMode, setDarkMode] = useState(() => {
                try { return JSON.parse(localStorage.getItem('eglux_gallery_dark') || 'false'); } catch { return false; }
            });
            const [search, setSearch] = useState('');
            const [filterModel, setFilterModel] = useState('All');
            const [filterTag, setFilterTag] = useState('All');

                if (darkMode) document.documentElement.classList.add('dark');

                localStorage.setItem('eglux_gallery_dark', JSON.stringify(darkMode));
            }, [darkMode]);

            useEffect(() => {
                loadItems();
            }, []);

            const loadItems = async () => {
                setIsLoading(true);
                try {
                    const data = await dbGetAll();
                    setItems(data);
                } catch(e) { console.error('DB Error:', e); }
                setIsLoading(false);
            };

            const handleSave = async (item) => {
                try {
                    await dbAdd(item);
                    await loadItems();
                } catch(e) { console.error('Save error:', e); alert('Gagal simpan: ' + e.message); }
            };

            const handleDelete = async (id) => {
                try {
                    await dbDelete(id);
                    await loadItems();
                } catch(e) { console.error('Delete error:', e); }
            };

            const handleImportFromPB = (promptItem) => {
                setImportQueue(promptItem);
                setShowImportPB(false);
                setShowUpload(true);
            };

            // Filters
            const allTags = useMemo(() => {
                const tags = new Set();
                items.forEach(i => i.tags?.forEach(t => tags.add(t)));
                return ['All', ...Array.from(tags)];
            }, [items]);

            const allModels = useMemo(() => {
                const models = new Set();
                items.forEach(i => { if(i.model) models.add(i.model); });
                return ['All', ...Array.from(models)];
            }, [items]);

            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const matchesSearch = !search || 
                        (item.title?.toLowerCase().includes(search.toLowerCase())) ||
                        (item.prompt?.toLowerCase().includes(search.toLowerCase())) ||
                        (item.tags?.some(t => t.toLowerCase().includes(search.toLowerCase())));
                    const matchesModel = filterModel === 'All' || item.model === filterModel;
                    const matchesTag = filterTag === 'All' || item.tags?.includes(filterTag);
                    return matchesSearch && matchesModel && matchesTag;
                });
            }, [items, search, filterModel, filterTag]);

                a.download = `eglux-gallery-backup-${Date.now()}.json`;
                a.click();

                                </div>
                                <div>
                                    <h1 className="text-lg font-bold leading-tight">
                                        <span className="bg-gradient-to-r from-gold-500 to-brand-500 bg-clip-text text-transparent">EGLUX</span>
                                        <span className="text-gray-900 dark:text-white"> AI Gallery</span>
                                    </h1>
                                    <p className="text-[11px] text-gray-500 dark:text-gray-400 font-medium">Image & Prompt Manager</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400 transition-colors">
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                                <Button onClick={() => window.location.href = 'index.html'} variant="secondary" icon={Icons.Sparkles} className="hidden sm:inline-flex">Prompt Builder</Button>
                                <Button onClick={exportData} variant="secondary" icon={Icons.Download} className="hidden sm:inline-flex">Backup</Button>
                                <Button onClick={() => setShowUpload(true)} variant="primary" icon={Icons.Upload}>Upload</Button>
                            </div>
                        </div>
                    </header>

                    {/* Toolbar */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                        <div className="flex flex-col lg:flex-row gap-4 items-start lg:items-center justify-between mb-6">
                            <div className="flex-1 w-full lg:w-auto">
                                <div className="relative">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></div>
                                    <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                                        placeholder="Cari gambar, prompt, atau tag..."
                                        className="w-full lg:w-96 pl-10 pr-4 py-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                                </div>
                            </div>
                            <div className="flex items-center gap-2 flex-wrap">
                                <Button onClick={() => setShowImportPB(true)} variant="secondary" icon={Icons.Import} className="text-xs">Import dari PromptBuilder</Button>
                                <div className="h-6 w-px bg-gray-200 dark:bg-gray-700 mx-1" />
                                <select value={filterModel} onChange={e => setFilterModel(e.target.value)}
                                    className="px-3 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-brand-500">
                                    {allModels.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                                <select value={filterTag} onChange={e => setFilterTag(e.target.value)}
                                    className="px-3 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-brand-500">
                                    {allTags.map(t => <option key={t} value={t}>{t === 'All' ? 'Semua Tag' : t}</option>)}
                                </select>
                                <div className="flex bg-gray-100 dark:bg-gray-800 rounded-xl p-1">
                                    <button onClick={() => setViewMode('grid')} className={`p-1.5 rounded-lg transition-all ${viewMode === 'grid' ? 'bg-white dark:bg-gray-700 text-brand-600 shadow-sm' : 'text-gray-500'}`}><Icons.Grid /></button>
                                    <button onClick={() => setViewMode('list')} className={`p-1.5 rounded-lg transition-all ${viewMode === 'list' ? 'bg-white dark:bg-gray-700 text-brand-600 shadow-sm' : 'text-gray-500'}`}><Icons.List /></button>
                                </div>
                            </div>
                        </div>

                        {/* Stats */}
                        <div className="flex items-center gap-4 mb-6 text-xs text-gray-500 dark:text-gray-400">
                            <span>{items.length} total gambar</span>
                            <span>•</span>
                            <span>{filteredItems.length} ditampilkan</span>
                            <span>•</span>
                            <span>{allTags.length - 1} tag</span>
                            <span>•</span>
                            <span>{allModels.length - 1} model</span>
                        </div>

                        {/* Gallery */}
                        {isLoading ? (
                            <div className="flex items-center justify-center py-20">
                                <div className="w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full animate-spin" />
                            </div>
                        ) : filteredItems.length === 0 ? (
                            <div className="text-center py-20 bg-white dark:bg-gray-800 rounded-2xl border border-dashed border-gray-300 dark:border-gray-700">
                                <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-400">
                                    <Icons.Image />
                                </div>
                                <h3 className="text-lg font-medium text-gray-900 dark:text-white mb-1">Gallery kosong</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Upload gambar hasil AI generate dan simpan prompt-nya</p>
                                <div className="flex justify-center gap-2">
                                    <Button onClick={() => setShowUpload(true)} variant="primary" icon={Icons.Upload}>Upload Gambar</Button>
                                    <Button onClick={() => setShowImportPB(true)} variant="secondary" icon={Icons.Import}>Import Prompt</Button>
                                </div>
                            </div>
                        ) : viewMode === 'grid' ? (
                            <div className="masonry-grid">
                                {filteredItems.map(item => (
                                    <div key={item.id} className="masonry-item group">
                                        <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden shadow-sm hover:shadow-lg transition-all cursor-pointer"
                                            onClick={() => { setSelectedItem(item); setShowDetail(true); }}>
                                            <div className="relative">
                                                <img src={item.imageData} alt={item.title} className="w-full h-auto object-cover" loading="lazy" />
                                                <div className="image-hover-overlay absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent flex flex-col justify-end p-4">
                                                    <p className="text-white text-xs font-medium line-clamp-2">{item.prompt}</p>
                                                    <div className="flex items-center gap-2 mt-2">
                                                        <span className="text-[10px] px-2 py-0.5 rounded bg-white/20 text-white backdrop-blur-sm">{item.model}</span>
                                                        {item.basePromptName && <span className="text-[10px] px-2 py-0.5 rounded bg-white/20 text-white backdrop-blur-sm">{item.basePromptName}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-3">
                                                <h3 className="text-sm font-semibold text-gray-900 dark:text-white truncate">{item.title || 'Untitled'}</h3>
                                                <div className="flex items-center justify-between mt-1">
                                                    <span className="text-[10px] text-gray-400">{formatDate(item.timestamp)}</span>
                                                    <div className="flex gap-1">
                                                        {item.tags?.slice(0, 2).map(tag => (
                                                            <span key={tag} className="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">{tag}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {filteredItems.map(item => (
                                    <div key={item.id} className="flex gap-4 bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-all cursor-pointer"
                                        onClick={() => { setSelectedItem(item); setShowDetail(true); }}>
                                        <img src={item.imageData} alt={item.title} className="w-24 h-24 sm:w-32 sm:h-32 object-cover rounded-xl flex-shrink-0" />
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-start justify-between">
                                                <div>
                                                    <h3 className="text-sm font-bold text-gray-900 dark:text-white">{item.title || 'Untitled'}</h3>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <Badge size="sm" color="brand">{item.model}</Badge>
                                                        {item.basePromptName && <Badge size="sm" color="gray">{item.basePromptName}</Badge>}
                                                        <span className="text-[10px] text-gray-400">{formatDate(item.timestamp)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <p className="text-xs text-gray-600 dark:text-gray-300 mt-2 line-clamp-2 font-mono">{item.prompt}</p>
                                            <div className="flex flex-wrap gap-1 mt-2">
                                                {item.tags?.map(tag => <Badge key={tag} size="sm" color="blue">{tag}</Badge>)}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
                        <p className="text-xs text-gray-400 dark:text-gray-600">Eglux AI Gallery • Images stored locally via IndexedDB • Prompts paired with results</p>
                    </footer>

                    {/* Modals */}
                    <UploadModal
                        isOpen={showUpload}
                        onClose={() => { setShowUpload(false); setImportQueue(null); }}
                        onSave={handleSave}
                        importedPrompt={importQueue}
                    />
                    <DetailModal
                        item={selectedItem}
                        isOpen={showDetail}
                        onClose={() => setShowDetail(false)}
                        onDelete={handleDelete}
                    />
                    <ImportPromptBuilderModal
                        isOpen={showImportPB}
                        onClose={() => setShowImportPB(false)}
                        onImport={handleImportFromPB}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
